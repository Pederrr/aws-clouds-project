AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Deploys the backend infrastructure for Booklogr, including an
  Auto Scaling group of EC2 instances running the Booklogr application and
  an Application Load Balancer to distribute traffic.
Resources:
  LBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckIntervalSeconds: 30
      HealthCheckPath: "/"
      Port: 80
      Protocol: HTTP
      HealthCheckPort: traffic-port
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 5
      UnhealthyThresholdCount: 2
      TargetType: instance
      Matcher: 
        HttpCode: 200
      HealthyThresholdCount: 5
      VpcId: !ImportValue Booklogr-VPC
      Name: booklogr-api
      HealthCheckEnabled: true
      TargetGroupAttributes: 
      - Key: "target_group_health.unhealthy_state_routing.minimum_healthy_targets.percentage"
        Value: "off"
      - Key: "deregistration_delay.timeout_seconds"
        Value: "300"
      - Key: "stickiness.type"
        Value: "lb_cookie"
      - Key: "stickiness.lb_cookie.duration_seconds"
        Value: "86400"
      - Key: "slow_start.duration_seconds"
        Value: "0"
      - Key: "stickiness.app_cookie.duration_seconds"
        Value: "86400"
      - Key: "load_balancing.algorithm.type"
        Value: "round_robin"
      - Key: "load_balancing.cross_zone.enabled"
        Value: "use_load_balancer_configuration"
      - Key: "target_group_health.dns_failover.minimum_healthy_targets.percentage"
        Value: "off"
      - Key: "target_group_health.unhealthy_state_routing.minimum_healthy_targets.count"
        Value: "1"
      - Key: "stickiness.enabled"
        Value: "false"
      - Key: "target_group_health.dns_failover.minimum_healthy_targets.count"
        Value: "1"
      - Key: "stickiness.app_cookie.cookie_name"
        Value: ""
      - Key: "load_balancing.algorithm.anomaly_mitigation"
        Value: "off"

  BooklogrLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData: 
        UserData: 
           Fn::Base64: 
            !Sub
              - |
               #!/bin/bash
               yum install docker -y
               systemctl enable docker --now
               
               docker run -d -p 80:5000 \
                 --name booklogr \
                 --env AUTH_SECRET_KEY=supersecretkey \
                 --env AUTH_ALLOW_REGISTRATION=True \
                 --env AUTH_REQUIRE_VERIFICATION=False \
                 --env SINGLE_USER_MODE=False \
                 --env DATABASE_URL=postgresql://postgres:password@${DbUrl}/booklogr?sslmode=require \
                  mozzo/booklogr:v1.10.0
              - DbUrl: !ImportValue Booklogr-DBEndpoint
        SecurityGroupIds: 
        - !ImportValue Booklogr-ServerSG
        ImageId: "ami-0236922087fa98b6e"
        InstanceType: t3.micro
        MetadataOptions: 
          HttpEndpoint: enabled
          HttpPutResponseHopLimit: 2
          HttpTokens: required

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: booklogr
      LaunchTemplate: 
        LaunchTemplateId: !Ref BooklogrLaunchTemplate
        Version: !GetAtt BooklogrLaunchTemplate.LatestVersionNumber
      MinSize: 2
      MaxSize: 4
      DesiredCapacity: 2
      Cooldown: 300
      TargetGroupARNs: 
      - !Ref LBTargetGroup
      HealthCheckType: "EC2"
      HealthCheckGracePeriod: 300
      VPCZoneIdentifier: 
      - !ImportValue Booklogr-PublicSubnet1
      - !ImportValue Booklogr-PublicSubnet2
      TerminationPolicies: 
      - "Default"
      NewInstancesProtectedFromScaleIn: false

  AutoScalingScalingPolicy:
    Type: "AWS::AutoScaling::ScalingPolicy"
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: "TargetTrackingScaling"
      TargetTrackingConfiguration: 
        PredefinedMetricSpecification: 
          PredefinedMetricType: "ASGAverageCPUUtilization"
        TargetValue: 70
        DisableScaleIn: false

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: booklogr-lb
      Scheme: internet-facing
      Type: application
      Subnets: 
      - !ImportValue Booklogr-PublicSubnet1
      - !ImportValue Booklogr-PublicSubnet2
      SecurityGroups: 
      - !ImportValue Booklogr-LoadBalancerSG
      IpAddressType: ipv4
      LoadBalancerAttributes: 
      - Key: "access_logs.s3.enabled"
        Value: "false"
      - Key: "health_check_logs.s3.enabled"
        Value: "false"
      - Key: "idle_timeout.timeout_seconds"
        Value: "60"
      - Key: "deletion_protection.enabled"
        Value: "false"
      - Key: "routing.http2.enabled"
        Value: "true"
      - Key: "routing.http.drop_invalid_header_fields.enabled"
        Value: "false"
      - Key: "routing.http.xff_client_port.enabled"
        Value: "false"
      - Key: "routing.http.preserve_host_header.enabled"
        Value: "false"
      - Key: "routing.http.xff_header_processing.mode"
        Value: "append"
      - Key: "load_balancing.cross_zone.enabled"
        Value: "true"
      - Key: "routing.http.desync_mitigation_mode"
        Value: "defensive"
      - Key: "client_keep_alive.seconds"
        Value: "3600"
      - Key: "waf.fail_open.enabled"
        Value: "false"
      - Key: "routing.http.x_amzn_tls_version_and_cipher_suite.enabled"
        Value: "false"
      - Key: "zonal_shift.config.enabled"
        Value: "false"
      - Key: "connection_logs.s3.enabled"
        Value: "false"

  LoadBalancerListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: "HTTP"
      DefaultActions: 
      - Order: 1
        TargetGroupArn: !Ref LBTargetGroup
        Type: forward
      # CORS configuration for all responses
      ListenerAttributes:
      - Key: routing.http.response.access_control_allow_origin.header_value
        Value: !ImportValue Booklogr-DomainName
      - Key: routing.http.response.access_control_allow_methods.header_value
        Value: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
      - Key: routing.http.response.access_control_allow_headers.header_value
        Value: "Content-Type, Authorization"

  CORSPreflightListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Priority: "1"
      ListenerArn: !Ref LoadBalancerListener
      Conditions: 
      - Field: "http-request-method"
        HttpRequestMethodConfig: 
          Values: 
          - OPTIONS
      Actions: 
      - Type: fixed-response
        Order: 1
        FixedResponseConfig: 
          MessageBody: OK
          StatusCode: "200"
          ContentType: "text/plain"

Outputs:
  LoadBalancerDNSName:
    Description: "DNS name of the load balancer"
    Value: !GetAtt LoadBalancer.DNSName
